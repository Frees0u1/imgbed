name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and wrangler
        run: |
          # Remove lockfile with internal registry URLs so yarn resolves from npmjs.org
          rm -f package-lock.json
          yarn config set registry https://registry.npmjs.org
          yarn install --ignore-scripts
          yarn global add wrangler@4.105.0
          echo "$(yarn global bin)" >> $GITHUB_PATH

      - name: Generate worker routes
        run: node deploy/worker/generate-routes.js

      - name: Deploy to Cloudflare
        run: wrangler deploy --config deploy/worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
